<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shaurya Portfolio</title>

  <!-- Compiled Tailwind CSS -->
  <link rel="stylesheet" href="src/output.css" />
</head>

<body class="bg-black text-white min-h-screen flex flex-col">

  <!-- Navigation -->
  <header>
    <nav class="bg-red-500 py-4">
      <div class="max-w-6xl mx-auto flex justify-between items-center px-4">
        <h1 class="font-semibold text-lg">Shaurya</h1>
        <ul class="flex gap-6 text-sm md:text-base">
          <li class="cursor-pointer hover:underline">Home</li>
          <li class="cursor-pointer hover:underline">About</li>
          <li class="cursor-pointer hover:underline">Contact</li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="flex-grow">
    <section class="max-w-5xl mx-auto my-12 px-4">
      <div class="flex flex-col md:flex-row items-center bg-gray-900 rounded-xl shadow-md p-6">

        <!-- Image -->
        <div class="flex-shrink-0">
          <img
            class="w-64 h-64 object-cover rounded-lg"
            src="Cutie.png"
            alt="Cute dog"
          />
        </div>

        <!-- Text Content -->
        <div class="md:ml-6 mt-4 md:mt-0 text-center md:text-left">
          <h1 class="font-semibold text-2xl">
            Cutie here to watch you blush!
          </h1>
          <p class="text-gray-300 mt-3 text-lg">
            🐶 Certified Blush Inspector reporting for duty! 💖
          </p>
        </div>

      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="text-center text-gray-400 text-sm py-4">
    © 2026 Shaurya. All rights reserved.
  </footer>

</body>
</html>
