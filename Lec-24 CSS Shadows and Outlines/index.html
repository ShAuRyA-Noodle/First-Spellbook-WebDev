<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shaurya Punj | CSS Shadows</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #020617;
            color: #e5e7eb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 40px;
        }

        /* Box shadow example */
        .box {
            border: 3px solid black;
            padding: 30px;
            text-align: center;
            background-color: white;
            color: black;
            box-shadow: 10px 10px 30px 10px crimson;
            margin-bottom: 40px;
        }

        /* Text shadow example */
        .text-shadow {
            border: 3px solid black;
            padding: 20px;
            font-size: 24px;
            text-shadow: 5px 5px 4px red;
        }
    </style>
</head>

<body>

    <div class="box">
        Hi, I am Shaurya Punj
    </div>

    <div class="text-shadow">
        Hi, my best friend is Vasu Gupta &lt;3
    </div>

</body>
</html>
