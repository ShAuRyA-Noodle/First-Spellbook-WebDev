<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shaurya Punj | Borders & Outlines</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #020617;
            color: #e5e7eb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 40px;
        }

        /* Outline example */
        .outline-box {
            outline: 5px solid crimson;
            outline-offset: 8px;
            padding: 15px;
            margin-bottom: 40px;
        }

        /* Border example */
        .border-box {
            border: 5px solid blueviolet;
            padding: 15px;
            border-radius: 50px;
        }
    </style>
</head>

<body>

    <div class="outline-box">
        This box is styled using an outline.
    </div>

    <div class="border-box">
        This box is styled using a border with rounded corners.
    </div>

</body>
</html>
