<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Transforms – Complete Reference</title>

  <!-- External stylesheet containing transform definitions -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 
    Wrapper container holding all transform demonstration boxes.
    Each box showcases a specific CSS transform property.
  -->
  <div class="wrap">

    <!-- scaleX(): Scales the element horizontally along the X-axis -->
    <div class="box">
      <div class="blue scaleX">
        scaleX
      </div>
    </div>

    <!-- scaleY(): Scales the element vertically along the Y-axis -->
    <div class="box">
      <div class="blue scaleY">
        scaleY
      </div>
    </div>

    <!-- scale(): Uniformly scales the element along both X and Y axes -->
    <div class="box">
      <div class="blue scale">
        scale
      </div>
    </div>

    <!-- translateX(): Moves the element horizontally along the X-axis -->
    <div class="box">
      <div class="blue translateX">
        translateX
      </div>
    </div>

    <!-- translateY(): Moves the element vertically along the Y-axis -->
    <div class="box">
      <div class="blue translateY">
        translateY
      </div>
    </div>

    <!-- translate(): Moves the element along both X and Y axes -->
    <div class="box">
      <div class="blue translate">
        translate
      </div>
    </div>

    <!-- 
      matrix(): 
      Applies a 2D transformation using a matrix of six values.
      Used internally by the browser for complex transforms.
    -->
    <div class="box">
      <div class="blue matrix">
        matrix
      </div>
    </div>

    <!-- rotate(): Rotates the element around the Z-axis -->
    <div class="box">
      <div class="blue rotate">
        rotate
      </div>
    </div>

    <!-- skew(): Skews the element along both X and Y axes -->
    <div class="box">
      <div class="blue skew">
        skew
      </div>
    </div>

    <!-- skewX(): Skews the element along the X-axis only -->
    <div class="box">
      <div class="blue skewX">
        skewX
      </div>
    </div>

    <!-- skewY(): Skews the element along the Y-axis only -->
    <div class="box">
      <div class="blue skewY">
        skewY
      </div>
    </div>

    <!-- 
      matrix3d():
      Applies a 3D transformation using a matrix of 16 values.
      Advanced and rarely written manually.
    -->
    <div class="box">
      <div class="blue matrix3d">
        matrix3d
      </div>
    </div>

    <!-- translate3d(): Moves the element along X, Y, and Z axes -->
    <div class="box">
      <div class="blue translate3d">
        translate3d
      </div>
    </div>

    <!-- rotateY(): Rotates the element around the Y-axis (3D rotation) -->
    <div class="box">
      <div class="blue rotateY">
        rotateY
      </div>
    </div>

    <!-- rotateX(): Rotates the element around the X-axis (3D rotation) -->
    <div class="box">
      <div class="blue rotateX">
        rotateX
      </div>
    </div>

    <!-- translateZ(): Moves the element forward/backward along the Z-axis -->
    <div class="box">
      <div class="blue translateZ">
        translateZ
      </div>
    </div>

  </div>

</body>
</html>
