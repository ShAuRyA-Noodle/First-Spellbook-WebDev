<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shaurya Punj | CSS Transforms</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f8fafc;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            width: 100vw;
            height: 60vh;
            border: 3px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            width: 80px;
            height: 60px;
            background-color: rgba(65, 65, 255, 0.75);
            border: 2px solid black;

            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;

            /* ================= TRANSFORMS ================= */

            /* Rotate element */
            transform: rotate(45deg);

            /* Change the pivot point of rotation */
            transform-origin: 10% 0%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">Shaurya</div>
    </div>

</body>
</html>
