<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaurya Punj | Nature Media Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui, Arial, sans-serif;
            background: #020617;
            color: #e5e7eb;
        }

        header, nav, main, section, article, aside, footer {
            padding: 20px;
        }

        header {
            background: #0f172a;
            text-align: center;
        }

        nav {
            background: #020617;
            text-align: center;
        }

        nav h3 {
            background: #020617;
            color: aquamarine;
            margin-bottom: 10px;
        }

        .video-banner {
            width: 100%;
            max-width: 700px;
            border-radius: 10px;
        }

        main {
            display: grid;
            gap: 30px;
            padding: 30px;
        }

        article, section {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 20px;
        }

        h2 {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .audio-grid {
            display: grid;
            gap: 10px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        aside video {
            width: 100%;
            border-radius: 10px;
        }

        footer {
            background: #0f172a;
            text-align: center;
            padding: 25px;
            font-size: 14px;
        }

        footer p {
            color: chartreuse;
        }
    </style>
</head>

<body>

<header>
    <h1>🌿 Shaurya's Nature Media Gallery</h1>
</header>

<nav>
    <h3>Nature Vibes</h3>
    <video src="Vid-03.mp4" autoplay muted loop class="video-banner"></video>
</nav>

<main>

    <!-- Local Audio Section -->
    <article>
        <h2>Garage Band Samples</h2>
        <div class="audio-grid">
            <audio src="sample1.mp3" controls></audio>
            <audio src="sample2.mp3" controls></audio>
            <audio src="sample3.mp3" controls></audio>
        </div>
    </article>

    <!-- External Audio Section -->
    <section>
        <h2>Google Sample Audios</h2>
        <div class="audio-grid">
            <audio src="sample4.mp3" controls></audio>
            <audio src="sample5.mp3" controls></audio>
            <audio src="sample6.mp3" controls></audio>
        </div>
    </section>

    <!-- Video Gallery -->
    <section class="video-grid">
        <aside>
            <video src="Vid-01.mp4" controls muted></video>
        </aside>

        <video src="Vid-02.mp4" controls></video>
        <video src="Vid-04.mp4" controls></video>
    </section>

    <!-- Extra Highlight Video -->
    <section>
        <video src="VID-05.mp4" controls autoplay muted width="300"></video>
    </section>

</main>

<footer>
    <video src="Trance.mp4" controls autoplay width="400"></video>
    <p>
        This website is a practice test project by Shaurya Punj.  
        All rights reserved.
    </p>
</footer>

</body>
</html>
