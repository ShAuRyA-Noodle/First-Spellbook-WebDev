<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Shaurya Punj | Inline vs Block Elements</title>

    <!-- Simple internal styling -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0f172a;
            color: #e5e7eb;
            padding: 40px;
        }

        .block {
            background-color: #1e293b;
            padding: 10px;
            margin: 10px 0;
        }

        .inline {
            background-color: #38bdf8;
            color: #020617;
            padding: 4px 6px;
        }
    </style>
</head>

<body>

    <h1>Inline vs Block Elements</h1>

    <!-- Block elements -->
    <p class="block">This is a paragraph (block element)</p>
    <div class="block">This is a div (block element)</div>

    <!-- Inline elements -->
    <span class="inline">This is a span (inline element)</span>
    <a class="inline" href="https://www.netflix.com" target="_blank">Netflix (inline element)</a>

</body>
</html>
