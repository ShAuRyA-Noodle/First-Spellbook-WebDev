<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaurya Punj | nth-child Exercise</title>

    <style>
        /* Highlight the first paragraph inside div */
        div p:first-child {
            background-color: yellow;
            color: red;
        }

        /* Style all paragraphs inside div */
        div p {
            background-color: blue;
            color: white;
            padding: 10px;
            margin-bottom: 6px;
        }
    </style>
</head>

<body>

    <div>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit.</p>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit.</p>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit.</p>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
    </div>

</body>
</html>
