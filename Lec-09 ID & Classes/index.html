<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Shaurya Punj | IDs & Classes</title>

    <!-- Internal demo styling -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0f172a;
            color: #e5e7eb;
            padding: 40px;
        }

        /* Class selector */
        .red {
            color: #ef4444;
            font-weight: bold;
        }

        /* Class selector */
        .bg-yellow {
            background-color: #fde047;
            padding: 10px;
            border-radius: 6px;
            color: #020617;
        }

        /* ID selector */
        #firstdiv {
            margin-bottom: 10px;
        }

        /* ID selector */
        #seconddiv {
            border: 2px dashed #38bdf8;
            padding: 10px;
        }
    </style>
</head>

<body>

    <!-- Element with ID + multiple classes -->
    <div id="firstdiv" class="red bg-yellow">First</div>

    <!-- Element with ID + single class -->
    <div id="seconddiv" class="red">Second</div>

</body>
</html>
