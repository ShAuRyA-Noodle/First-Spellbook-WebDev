<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shaurya Punj | CSS Display Properties</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #020617;
            color: #e5e7eb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 30px;
        }

        /* Converted from block to inline */
        .inline-box {
            border: 3px solid black;
            background-color: cornflowerblue;
            display: inline;
            padding: 10px;
        }

        /* Inline-block element */
        .inline-block-box {
            border: 3px solid black;
            background-color: cornflowerblue;
            display: inline-block;
            padding: 40px;
            margin: 45px;
            width: 150px;
        }
    </style>
</head>

<body>

    <div class="inline-box">Hi, I am Shaurya Punj</div>
    <div class="inline-box">I was a block element</div>

    <div class="inline-block-box">
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Cupiditate, atque!
    </div>

</body>
</html>
