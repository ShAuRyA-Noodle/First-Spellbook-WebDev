<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Shaurya Punj | Importing Fonts</title>

    <!-- Google Font using <link> method -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap" 
        rel="stylesheet"
    >

    <!-- Google Font using @import method -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap');

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #020617;
            color: #e5e7eb;
            padding: 40px;
        }

        h1 {
            font-size: 40px;
            font-family: "Baloo 2", cursive;
            text-decoration: underline wavy blue;
            text-indent: 50px;
            margin-bottom: 20px;
        }

        p {
            font-family: "Roboto", sans-serif;
            line-height: 2;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <h1>Shaurya Punj</h1>

    <p>
        This is Shaurya Punj. I am working hard to build a successful future and make my family proud.
    </p>

    <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ad modi animi, asperiores dolor harum tempore
        quisquam tempora doloremque facere beatae similique illum doloribus praesentium quos.
    </p>

</body>
</html>
