<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Shaurya Punj | CSS Colors</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #020617;
            color: #e5e7eb;
            padding: 40px;
        }

        .center-color-keywords {
            text-align: center;
            color: black;
            background-color: palevioletred;
            padding: 10px;
            border-radius: 6px;
        }

        .hex {
            color: #00c1ff;
        }

        .rgb {
            color: rgb(28, 188, 41);
        }

        .rgba {
            color: rgba(199, 247, 7, 0.67);
        }

        .hsl {
            color: hsl(200, 80%, 60%);
        }
    </style>
</head>

<body>

    <h1 class="center-color-keywords">Hello, I am Shaurya Punj</h1>

    <p>Colors in CSS can be represented in the following ways:</p>
    <ol>
        <li>Color Keywords</li>
        <li>Hex Codes</li>
        <li>RGB</li>
        <li>RGBA</li>
        <li>HSL</li>
    </ol>

    <h2 class="hex">Hello, my sister is Shreya Punj</h2>
    <h2 class="rgb">My parents are Sanjeev Punj and Rajni Punj</h2>
    <h2 class="rgba">My bua is Bharti Shori</h2>
    <h2 class="hsl">HSL color example</h2>

</body>
</html>
