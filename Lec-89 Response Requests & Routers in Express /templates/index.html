<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    ----------------------------------------------------------------
    External CSS Example
    ----------------------------------------------------------------
    Instead of embedding styles directly inside the HTML file,
    production systems typically use external stylesheet files
    to maintain separation of concerns, reusability, and scalability.
    ----------------------------------------------------------------
  -->
  <link rel="stylesheet" href="styles.css" />

  <title>External CSS Example</title>
</head>

<body>
  <main>
    <p class="mantra-text">
      Hare Krishna Hare Krishna Krishna Krishna Hare Hare
      Hare Rama Hare Rama Rama Rama Hare Hare
    </p>
  </main>
</body>
</html>
