<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaurya Punj | CSS Box Model</title>

    <style>
        /* Reset default browser spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #020617;
            color: #e5e7eb;
            padding: 40px;
        }

        /* Common box styling */
        .box {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .box1 {
            background-color: violet;
            padding: 15px;
            margin: 10px;
            border: 5px solid greenyellow;
            height: 300px;
            box-sizing: border-box;
        }

        .box2 {
            background-color: mediumspringgreen;
            color: red;
            padding: 15px;
            margin: 10px;
            border: 5px solid black;
            height: 300px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <div class="box box1">
        Hi, I am Shaurya Punj inside Box 1.
    </div>

    <div class="box box2">
        Hello, my sister is Shreya Punj.
    </div>

</body>
</html>
