<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz - 04 Hacking Simulator</title>

<style>
    body{
        margin:0;
        background:black;
        color:#00ff00;
        font-family: monospace;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .terminal{
        width:700px;
        height:400px;
        border:2px solid #00ff00;
        padding:20px;
        overflow:auto;
        background:#000;
    }

    .line{
        margin:10px 0;
    }

    /* blinking dots */
    .dots::after{
        content:"...";
        animation: blink 1s infinite;
    }

    @keyframes blink{
        0%{opacity:0}
        50%{opacity:1}
        100%{opacity:0}
    }
</style>
</head>

<body>

<div class="terminal" id="terminal"></div>

<script src="script.js"></script>
</body>
</html>
