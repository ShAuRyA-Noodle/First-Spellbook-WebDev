<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- 
        Viewport meta tag ensures the layout scales correctly
        across different screen sizes and devices.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mini Project – 05 | Language Downloads</title>

    <style>
        /* ===============================
           Global Page Styling
        =============================== */

        body {
            background-color: bisque;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* ===============================
           Main Grid Container
           This container holds all language cards
        =============================== */
        .bod {
            width: 80vw;
            margin: 100px auto;
            padding: 20px;

            /* CSS Grid layout */
            display: grid;
            grid-template-columns: repeat(3, 400px);
            grid-template-rows: repeat(4, 400px);

            background-color: rgb(248, 169, 140);
            border: 1px solid rgba(252, 148, 110, 0.916);
        }

        /* ===============================
           Individual Language Card
        =============================== */
        .box {
            width: 300px;
            height: 300px;
            margin: 15px;

            text-align: center;
            background-color: rgba(254, 246, 86, 0.822);
            border: 2px solid black;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* ===============================
           Download Button Container
        =============================== */
        .download {
            margin-top: 100px;
            padding: 10px;

            border: 2px solid black;
            border-radius: 10px;
            background-color: rgb(0, 251, 255);
        }

        /* ===============================
           Download Link Styling
        =============================== */
        .downbox {
            text-decoration: none;
            color: crimson;
            font-weight: bold;
        }

        .downbox:hover {
            color: darkred;
        }
    </style>
</head>

<body>

    <!-- 
        Main container displaying downloadable
        language versions using CSS Grid
    -->
    <div class="bod">

        <div class="box">
            <h2>English</h2>
            <div class="download">
                <a class="downbox" href="english.exe">64-bit Download</a>
            </div>
        </div>

        <div class="box">
            <h2>Deutsch</h2>
            <div class="download">
                <a class="downbox" href="german.exe">64-bit Download</a>
            </div>
        </div>

        <div class="box">
            <h2>Italiano</h2>
            <div class="download">
                <a class="downbox" href="italian.exe">64-bit Download</a>
            </div>
        </div>

        <div class="box">
            <h2>Español</h2>
            <div class="download">
                <a class="downbox" href="spanish.exe">64-bit Download</a>
            </div>
        </div>

        <div class="box">
            <h2>Français</h2>
            <div class="download">
                <a class="downbox" href="french.exe">64-bit Download</a>
            </div>
        </div>

        <div class="box">
            <h2>Português (Brasil)</h2>
            <div class="download">
                <a class="downbox" href="portugese.exe">64-bit Download</a>
            </div>
        </div>

        <div class="box">
            <h2>日本語</h2>
            <div class="download">
                <a class="downbox" href="japanese.exe">64-bit Download</a>
            </div>
        </div>

        <div class="box">
            <h2>한국어</h2>
            <div class="download">
                <a class="downbox" href="korean.exe">64-bit Download</a>
            </div>
        </div>

        <div class="box">
            <h2>简体中文</h2>
            <div class="download">
                <a class="downbox" href="chinese.exe">64-bit Download</a>
            </div>
        </div>

        <div class="box">
            <h2>繁體中文</h2>
            <div class="download">
                <a class="downbox" href="chinesetrad.exe">64-bit Download</a>
            </div>
        </div>

    </div>

</body>
</html>

<!--
Rough Notes (Professionally Explained)

• This project uses CSS Grid to create a clean, structured
  layout for displaying multiple download cards.

• Each card represents a language version of the software
  with a dedicated download button.

• Download links can be replaced with real executable
  URLs once available.

• Grid layout ensures consistency, scalability, and
  easy expansion if more languages are added in future.
-->
