<!-- Rough Notes
semantic tags are great help improve seo of the website and overall code maintained website is more accssible 
semantic tags example
header used to represent top section of the web page
nav signifies navigation bar
article indicates self contained peice of content
section represent thematic grouping of content 
aside represent content that is tangentially related to the content around it
footer represent bottom section of the web page usually contains copyright information and contact information
figure used for embedding multimedia content like images, graphs etc
figcaption used to provide caption for the content inside figure tag
main signifies main content of the web page
time used to represent time related information like date and time -->
