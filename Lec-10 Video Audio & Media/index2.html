<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Shaurya Punj | Embedded Media</title>

    <!-- Minimal styling -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #020617;
            color: #e5e7eb;
            padding: 40px;
        }

        .media-block {
            margin-bottom: 30px;
        }

        iframe, img {
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- SVG Image -->
    <div class="media-block">
        <h2>SVG Image</h2>
        <img src="img.svg" alt="My SVG Illustration">
    </div>

    <!-- External Website via iframe -->
    <div class="media-block">
        <h2>Embedded Website (Wikipedia)</h2>
        <iframe 
            src="https://en.wikipedia.org/wiki/The_Chainsmokers" 
            width="100%" 
            height="400" 
            loading="lazy"
        ></iframe>
    </div>

    <!-- YouTube Video Embed -->
    <div class="media-block">
        <h2>YouTube Video</h2>
        <iframe 
            width="560" 
            height="315" 
            src="https://www.youtube.com/embed/mesnjZBIlPY" 
            title="YouTube video player"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
        ></iframe>
    </div>

</body>
</html>
