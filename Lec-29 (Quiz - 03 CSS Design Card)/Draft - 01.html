<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shaurya Punj | Profile Card</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <img src="Shaurya.png" alt="Shaurya Punj" class="profile-image">

    <h1 class="name">Shaurya Punj</h1>
    <p class="title">Kingslayer</p>

    <p class="quote">
        We're just a room full of strangers  
        Looking for something to save us…  
        Dying to live, living to die.
    </p>

    <button class="read-more">Read More</button>

</div>

</body>
</html>
<!-- 
“The description and the bottom ‘Read More’ section can be placed inside a single container with a border. This allows the entire content area to behave as one unified card, making layout alignment and styling easier.” -->
