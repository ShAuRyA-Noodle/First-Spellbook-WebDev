<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive layout on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Shaurya Punj | Images & Tables</title>

    <!-- External stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Basic internal styling for clean layout -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0f172a;
            color: #e5e7eb;
            padding: 40px;
        }

        img {
            display: block;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        table {
            border-collapse: collapse;
            width: 300px;
            margin-top: 20px;
            background-color: #020617;
        }

        caption {
            margin-bottom: 8px;
            font-weight: bold;
            color: #93c5fd;
        }

        th, td {
            border: 1px solid #334155;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #1e293b;
        }

        tfoot td {
            background-color: #020617;
            font-weight: bold;
            color: #38bdf8;
        }
    </style>
</head>

<body>

    <!-- Image Example -->
    <img 
        src="Monster.png" 
        alt="Monster Energy Drink Can" 
        width="400" 
        height="300"
    >

    <!-- Line break -->
    <br>

    <!-- Table Example -->
    <table>
        <caption>Siblings Information</caption>

        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Shreya</td>
                <td>23</td>
            </tr>
            <tr>
                <td>Shaurya</td>
                <td>19</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td>Rajni</td>
                <td>Core</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
