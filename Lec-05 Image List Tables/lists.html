<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Shaurya Punj | HTML Lists</title>

    <!-- Simple internal styling -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0f172a;
            color: #e5e7eb;
            padding: 40px;
        }

        h1 {
            margin-bottom: 20px;
        }

        section {
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <h1>📋 HTML List Examples</h1>

    <!-- Unordered List -->
    <section>
        <h2>Unordered List</h2>
        <ul type="circle">
            <li>Shaurya</li>
            <li>Shreya</li>
            <li>Rajni</li>
            <li>Sanjeev</li>
            <li>Bharti</li>
        </ul>
    </section>

    <!-- Ordered List -->
    <section>
        <h2>Ordered List</h2>
        <ol type="I">
            <li>Shaurya</li>
            <li>Shreya</li>
            <li>Rajni</li>
            <li>Sanjeev</li>
            <li>Bharti</li>
        </ol>
    </section>

    <!-- Definition List -->
    <section>
        <h2>Definition List</h2>
        <dl>
            <dt>Shaurya</dt>
            <dd>Hello, I am Shaurya Punj, learning web development from the basics.</dd>
        </dl>
    </section>

</body>
</html>
