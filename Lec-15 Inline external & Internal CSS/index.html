<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css-02</title>
    <style>
        div{
            background-color: black;
            color: thistle;
        }
    </style>
</head>
<body>
    <h1 style="color: sandybrown; background-color: black;">
        Shaurya Punj 
    </h1> 
    <!-- Inline css used in h1 tag -->
    <div>
        Shaurya Punj is a good boy and will become a great businessman.
    </div>
    <br>
    <div>
        Hello Shreya Punj when will you come back to India.
    </div>
    <!-- Internal css used in div tag using style tag just under the title tag aur ab har div tag mein woh internal css implement ho jayegi  -->
</body>
</html>

<!-- Rough Notes
How to add css in html document 
inline css it is used using style attribute in html tag
intenal css it is used to add style tag and place html page style in it
external css it is used to add css file in html document using link tag -->
