<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Shaurya Punj | CSS Methods</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #020617;
            color: #e5e7eb;
            padding: 40px;
        }

        /* Internal CSS applied to all divs */
        .box {
            background-color: black;
            color: thistle;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <!-- Inline CSS (not recommended for large projects) -->
    <h1 style="color: sandybrown; background-color: black; padding: 10px;">
        Shaurya Punj
    </h1>

    <!-- Internal CSS applied via class -->
    <div class="box">
        Shaurya Punj is a good boy and will become a great businessman.
    </div>

    <div class="box">
        Hello Shreya Punj, when will you come back to India?
    </div>

</body>
</html>
