<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding for all languages -->
    <meta charset="UTF-8">

    <!-- Makes the page responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title shown in browser tab -->
    <title>Shaurya Punj | Bookmarks</title>

    <!-- Simple internal styling for clean UI -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            margin: 0;
            padding: 40px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 30px;
            color: #93c5fd;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .bookmark {
            margin: 8px 0;
        }
    </style>
</head>

<body>

    <h1>🔖 My Bookmarks</h1>

    <!-- Primary bookmarks section -->
    <section>
        <h2>Primary Bookmarks</h2>

        <p class="bookmark">
            <a href="https://www.google.com" target="_blank" rel="noopener noreferrer">
                Open Google
            </a>
        </p>

        <p class="bookmark">
            <a href="https://mail.google.com" target="_blank" rel="noopener noreferrer">
                Open Gmail
            </a>
        </p>

        <p class="bookmark">
            <a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer">
                Open YouTube
            </a>
        </p>
    </section>

    <!-- Entertainment bookmarks section -->
    <section>
        <h2>Entertainment Bookmarks</h2>

        <p class="bookmark">
            <a href="https://music.youtube.com" target="_blank" rel="noopener noreferrer">
                YouTube Music
            </a>
        </p>

        <p class="bookmark">
            <a href="https://www.netflix.com" target="_blank" rel="noopener noreferrer">
                Netflix
            </a>
        </p>

        <p class="bookmark">
            <a href="https://www.twitch.tv" target="_blank" rel="noopener noreferrer">
                Twitch TV
            </a>
        </p>
    </section>

</body>
</html>
