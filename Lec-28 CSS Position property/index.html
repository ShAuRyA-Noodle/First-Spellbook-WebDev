<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shaurya Punj | CSS Positioning</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #020617;
            color: #e5e7eb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 40px;
        }

        .parent {
            position: relative;        /* Reference container */
            border: 5px solid orchid;
            padding: 20px;
            width: 90vw;
            height: 70vh;
        }

        .box {
            width: 200px;
            height: 100px;
            border: 4px solid black;
            margin-bottom: 10px;
        }

        .box1 {
            background-color: chartreuse;
            position: absolute;
            top: 0;
            left: 0;
        }

        .box2 {
            background-color: crimson;
        }

        .box3 {
            background-color: coral;
            position: relative;
            top: -20px;
            z-index: 1;
        }

        .box4 {
            background-color: darkorange;
            position: relative;
            top: -50px;
            z-index: 2;
        }

        .box5 {
            background-color: aqua;
        }
    </style>
</head>

<body>

    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
        <div class="box box5"></div>
    </div>

</body>
</html>
