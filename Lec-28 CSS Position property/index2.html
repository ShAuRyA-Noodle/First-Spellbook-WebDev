<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shaurya Punj | Sticky & Fixed Position</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #020617;
            color: crimson;
            font-family: Arial, Helvetica, sans-serif;
        }

        .parent {
            height: 1500px;
            padding: 20px;
            border: 5px solid lime;
        }

        .box {
            width: 80vw;
            height: 100px;
            border: 4px solid black;
            margin: 10px auto;
        }

        /* Sticky navigation bar */
        .sticky {
            background-color: chartreuse;
            position: sticky;
            top: 0;
            height: 90px;
        }

        .red { background-color: crimson; }
        .coral { background-color: coral; }
        .orange { background-color: darkorange; }

        /* Fixed floating element */
        .fixed {
            background-color: aqua;
            position: fixed;
            bottom: 30px;
            left: 35px;
            width: 150px;
            height: 80px;
        }
    </style>
</head>

<body>

    <div class="parent">
        <div class="box sticky">Sticky Navigation Bar</div>
        <div class="box red"></div>
        <div class="box coral"></div>
        <div class="box orange"></div>
        <div class="box fixed">Fixed Button</div>
    </div>

</body>
</html>
