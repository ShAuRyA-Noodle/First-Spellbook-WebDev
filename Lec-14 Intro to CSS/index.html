<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Shaurya Punj | CSS Basics</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #020617;
            color: #e5e7eb;
            padding: 40px;
        }

        /* Group selector: applies same style to both */
        div, span {
            background-color: lightskyblue;
            color: #020617;
            padding: 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>

    <div>
        <p>Hello, today I am starting to learn the CSS language.</p>
    </div>

    <span>
        Hello, I am Shaurya Punj. I am learning how to style websites using CSS.
    </span>

</body>
</html>
