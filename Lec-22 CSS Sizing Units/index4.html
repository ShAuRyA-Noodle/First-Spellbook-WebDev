<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shaurya Punj | Percentage Based Widths</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #020617;
            color: #e5e7eb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 30px;
        }

        /* Parent container */
        .box {
            border: 5px solid black;
            background-color: yellowgreen;
            color: blue;
            width: 80vw;
            padding: 15px;
        }

        /* First child div (50% of .box) */
        .box > .child {
            width: 50%;
            border: 3px solid black;
            padding: 10px;
        }

        /* Nested child div (50% of .child) */
        .child > .nested {
            width: 50%;
            border: 2px solid orangered;
            padding: 8px;
        }
    </style>
</head>

<body>

    <div class="box">
        <div class="child">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Quo nesciunt, minima quae modi temporibus itaque illum qui iusto quibusdam eum.

            <div class="nested">
                Hello, I am Shaurya Punj
            </div>
        </div>
    </div>

</body>
</html>
