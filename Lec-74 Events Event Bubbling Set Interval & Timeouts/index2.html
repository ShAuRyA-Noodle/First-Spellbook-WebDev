<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bubbling</title>

    <style>
        .child {
            border: 3px solid black;
            margin: 25px;
            padding: 20px;
            width: 400px;
            background-color: rgb(196, 255, 235);
            cursor: pointer;
        }

        .container {
            padding: 15px;
            margin: 15px;
            background-color: black;
        }

        .childcontainer {
            padding: 15px;
            margin: 25px;
            background-color: rgb(255, 240, 74);
        }
    </style>
</head>

<body>

<div class="container">
    <section class="childcontainer">
        <div class="child">
            Hi I am Shaurya Punj
        </div>
    </section>
</div>

<script>
/* =========================================================
   Event Bubbling Demonstration
========================================================= */

const child = document.querySelector(".child");
const childContainer = document.querySelector(".childcontainer");
const container = document.querySelector(".container");

/* Child click */
child.addEventListener("click", (e) => {
    e.stopPropagation();
    alert("Child clicked");
});

/* ChildContainer click */
childContainer.addEventListener("click", (e) => {
    e.stopPropagation();
    alert("Child container clicked");
});

/* Container click */
container.addEventListener("click", (e) => {
    e.stopPropagation();
    alert("Container clicked");
});

/* =========================================================
   Random color utility
========================================================= */
function getRandomColor(){
    const r = Math.floor(Math.random()*256);
    const g = Math.floor(Math.random()*256);
    const b = Math.floor(Math.random()*256);
    return `rgb(${r},${g},${b})`;
}

/* Change background after 5 seconds */
setTimeout(()=>{
    childContainer.style.backgroundColor = getRandomColor();
},5000);

</script>

</body>
</html>
