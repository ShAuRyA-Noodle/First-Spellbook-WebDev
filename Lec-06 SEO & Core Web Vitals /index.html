<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ===============================
         BASIC METADATA
    ================================ -->

    <!-- Character encoding for all languages -->
    <meta charset="UTF-8">

    <!-- Responsive layout for mobile, tablet, and desktop -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO description for search engines -->
    <meta 
        name="description" 
        content="Official profile page of Shaurya Punj, a web developer learning modern web technologies and performance optimization."
    >

    <!-- Browser tab title -->
    <title>About Shaurya | Web Developer Journey</title>

    <!-- Preconnect improves loading performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Clean internal styling -->
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            line-height: 1.7;
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <!-- Main content card -->
    <div class="card">
        <h1>Shaurya Punj</h1>
        <p>
            I am a passionate learner on a journey to master modern web development,
            focusing on clean code, performance, accessibility, and user experience.
        </p>
    </div>

</body>
</html>
