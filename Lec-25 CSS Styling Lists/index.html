<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shaurya Punj | List Styling</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #020617;
            color: #e5e7eb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 30px;
        }

        nav ul {
            padding: 0;
        }

        nav ul li {
            border: 3px solid green;
            margin: 6px;
            padding: 10px 15px;
            background-color: black;
            color: crimson;
            list-style-type: "🥸";
            list-style-position: inside;
        }
    </style>
</head>

<body>

    <nav>
        <ul>
            <li>Play</li>
            <li>Home</li>
            <li>Store</li>
            <li>Help & Support</li>
            <li>About</li>
        </ul>
    </nav>

</body>
</html>
